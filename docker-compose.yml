services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: enlight
      POSTGRES_PASSWORD: enlight
      POSTGRES_DB: enlight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enlight"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://enlight:enlight@postgres:5432/enlight
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./shared/src:/app/shared/src
    develop:
      watch:
        - action: sync+restart
          path: ./packages/api/src
          target: /app/packages/api/src

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://enlight:enlight@postgres:5432/enlight
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/worker/src:/app/packages/worker/src
      - ./shared/src:/app/shared/src

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://enlight:enlight@postgres:5432/enlight
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
